name: Sync Cloudflare Access

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-cloudflare-access.yml"
      - "docs/access/**"
      - "scripts/sync-cloudflare-access-group.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-access-group:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync allowed email group
        run: node scripts/sync-cloudflare-access-group.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCESS_GROUP_NAME: ${{ vars.CLOUDFLARE_ACCESS_GROUP_NAME || 'LEO Readers' }}
          LEO_ALLOWED_EMAILS_JSON: ${{ secrets.LEO_ALLOWED_EMAILS_JSON }}
